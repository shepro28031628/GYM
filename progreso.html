<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Romeo Personal Trainer — Progreso Corporal</title>
  <meta name="description" content="Registra y monitorea la evolución física: peso, medidas corporales y gráficas de progreso." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="sidebar-container"></div>
<main class="main-content">
  <div id="topbar-container"></div>
  <div class="page-body">

    <div class="section-header">
      <h1>Seguimiento Corporal</h1>
      <p class="section-subtitle">Monitorea la evolución física de tus clientes con medidas y gráficas</p>
    </div>

    <div class="toolbar" style="flex-wrap: wrap; gap: 8px;">
      <div class="select-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        <select id="sel-usuario" onchange="onUsuarioChange()">
          <option value="">— Seleccionar Cliente —</option>
        </select>
      </div>
      <button class="btn-primary" id="btn-medicion" onclick="abrirModalMedicion()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nueva Medición
      </button>
      <button class="btn-secondary" id="btn-exportar-pdf" onclick="window.print()" style="display:flex; align-items:center; gap:8px;" disabled>
        🖨️ Exportar PDF
      </button>
      <button class="btn-secondary" id="btn-compartir-whatsapp" onclick="compartirProgresoWhatsapp()" style="display:flex; align-items:center; gap:8px; color:#25D366; border-color:rgba(37,211,102,0.3);" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor" style="width:14px;height:14px;"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.5-5.739-1.453L0 24zm6.59-4.846c1.6.95 2.568 1.487 4.595 1.488 5.489 0 9.952-4.467 9.955-9.961.002-2.661-1.033-5.164-2.915-7.049C16.345 1.748 13.847.712 11.2.713c-5.492 0-9.957 4.468-9.96 9.961-.001 2.072.548 3.09 1.524 4.77l-.99 3.612 3.883-.989zM17.15 14.88c-.285-.143-1.687-.832-1.947-.927-.26-.096-.45-.143-.64.143-.19.285-.736.927-.9.1.118-.175-.157-.285-.327-.585-.17-.3-.024-.556.048-.7.072-.143.19-.285.285-.429.096-.143.12-.24.18-.383.06-.143.03-.285-.015-.429-.045-.143-.45-1.085-.615-1.485-.164-.393-.347-.323-.48-.328l-.408-.005c-.143 0-.38.053-.578.271-.198.219-.759.742-.759 1.808 0 1.066.775 2.094.883 2.238.109.143 1.524 2.327 3.69 3.262.515.222.917.355 1.23.455.518.165.989.141 1.362.085.415-.062 1.272-.52 1.45-.989.18-.469.18-.871.127-.954-.053-.083-.198-.129-.482-.272z"/></svg>
        WhatsApp
      </button>
    </div>

    <div id="progreso-container">
      <div class="empty-state">
        <span class="empty-icon">📊</span>
        <h3>Selecciona un cliente</h3>
        <p>Elige un cliente para ver su historial de mediciones y evolución corporal</p>
      </div>
    </div>

  </div>
</main>

<!-- Modal Nueva Medición -->
<div class="modal-overlay" id="modal-medicion">
  <div class="modal">
    <div class="modal-header">
      <h2>Registrar Medición</h2>
      <button class="modal-close" onclick="closeModal('modal-medicion')">✕</button>
    </div>
    <form id="form-medicion" onsubmit="guardarMedicion(event)">
      <div class="form-section-title">Fecha, Mes, Peso y Grasa</div>
      <div class="form-grid">
        <div class="form-group"><label>Fecha *</label><input type="date" id="p-fecha" required /></div>
        <div class="form-group">
          <label>Mes de la Medición</label>
          <select id="p-mes">
            <option value="">Ninguno (Solo histórico)</option>
            <option value="1">Mes 1</option>
            <option value="2">Mes 2</option>
            <option value="3">Mes 3</option>
            <option value="4">Mes 4</option>
            <option value="5">Mes 5</option>
            <option value="6">Mes 6</option>
            <option value="7">Mes 7</option>
            <option value="8">Mes 8</option>
            <option value="9">Mes 9</option>
            <option value="10">Mes 10</option>
            <option value="11">Mes 11</option>
            <option value="12">Mes 12</option>
          </select>
        </div>
        <div class="form-group"><label>Peso Actual (kg) *</label><input type="number" id="p-peso" step="0.1" placeholder="70.5" required /></div>
        <div class="form-group"><label>% Grasa Corporal</label><input type="number" id="p-grasa-pct" step="0.1" placeholder="18" min="2" max="60" /></div>
        <div class="form-group"><label>% Masa Muscular</label><input type="number" id="p-muscular-pct" step="0.1" placeholder="38" min="5" max="80" /></div>
      </div>
      <div class="form-section-title">Medidas Corporales (cm)</div>
      <div class="form-grid">
        <div class="form-group"><label>Pecho</label><input type="number" id="p-pecho" step="0.5" placeholder="95" /></div>
        <div class="form-group"><label>Cintura</label><input type="number" id="p-cintura" step="0.5" placeholder="80" /></div>
        <div class="form-group"><label>Cadera</label><input type="number" id="p-cadera" step="0.5" placeholder="95" /></div>
        <div class="form-group"><label>Brazo Izquierdo</label><input type="number" id="p-brazo-izq" step="0.5" placeholder="35" /></div>
        <div class="form-group"><label>Brazo Derecho</label><input type="number" id="p-brazo-der" step="0.5" placeholder="35" /></div>
        <div class="form-group"><label>Muslo Izquierdo</label><input type="number" id="p-muslo-izq" step="0.5" placeholder="55" /></div>
        <div class="form-group"><label>Muslo Derecho</label><input type="number" id="p-muslo-der" step="0.5" placeholder="55" /></div>
        <div class="form-group"><label>Pantorrilla</label><input type="number" id="p-pantorrilla" step="0.5" placeholder="38" /></div>
      </div>
      <div class="form-section-title">Observaciones</div>
      <div class="form-group full" style="padding:0 0 8px">
        <label>Notas del entrenador</label>
        <textarea id="p-notas" rows="2" placeholder="Estado del cliente, observaciones..."></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary" onclick="closeModal('modal-medicion')">Cancelar</button>
        <button type="submit" class="btn-primary">Guardar Medición</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="shared.js"></script>
<script>
  document.getElementById('sidebar-container').innerHTML = buildSidebar('progreso');
  document.getElementById('topbar-container').innerHTML = buildTopbar('Seguimiento Corporal');
  document.getElementById('toast-container').innerHTML = buildToast();

  const sel = document.getElementById('sel-usuario');
  DB.usuarios.forEach(u => { const o = document.createElement('option'); o.value = u.id; o.textContent = u.nombre; sel.appendChild(o); });
  const param = new URLSearchParams(window.location.search).get('usuario');
  if (param) {
    sel.value = param;
    onUsuarioChange();
  } else {
    const activeUser = getActiveUser();
    if (activeUser) {
      sel.value = activeUser.id;
      onUsuarioChange();
    }
  }

  function onUsuarioChange() {
    const uid = sel.value;
    document.getElementById('btn-medicion').disabled = !uid;
    document.getElementById('btn-exportar-pdf').disabled = !uid;
    document.getElementById('btn-compartir-whatsapp').disabled = !uid;
    renderProgreso(uid);
  }

  function renderProgreso(uid) {
    const container = document.getElementById('progreso-container');
    if (!uid) { container.innerHTML = `<div class="empty-state"><span class="empty-icon">📊</span><h3>Selecciona un cliente</h3><p>Elige un cliente para ver su historial</p></div>`; return; }
    const u = DB.usuarios.find(x=>x.id===uid);
    const progresos = DB.progresos.filter(p=>p.usuarioId===uid).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
    
    const pesoActual = progresos[0]?.peso || u?.peso || 0;
    const diff = u?.peso ? (pesoActual - u.peso).toFixed(1) : 0;
    const b = bmi(pesoActual, u?.estatura);

    // Group progress by month column
    const mesMap = {};
    const monthlyLogs = DB.progresos.filter(p => p.usuarioId === uid && p.mes).sort((a,b) => new Date(a.fecha) - new Date(b.fecha));
    monthlyLogs.forEach(p => {
      mesMap[p.mes] = p;
    });

    const matrixRows = [
      { label: 'Peso (kg)', field: 'peso', unit: ' kg', decreaseIsGood: true },
      { label: 'Pecho (cm)', field: 'pecho', unit: ' cm', decreaseIsGood: false },
      { label: 'Cintura (cm)', field: 'cintura', unit: ' cm', decreaseIsGood: true },
      { label: 'Cadera (cm)', field: 'cadera', unit: ' cm', decreaseIsGood: true },
      { label: 'Brazo Izq. (cm)', field: 'brazoIzq', unit: ' cm', decreaseIsGood: false },
      { label: 'Brazo Der. (cm)', field: 'brazoDer', unit: ' cm', decreaseIsGood: false },
      { label: 'Muslo Izq. (cm)', field: 'musloIzq', unit: ' cm', decreaseIsGood: false },
      { label: 'Muslo Der. (cm)', field: 'musloDer', unit: ' cm', decreaseIsGood: false },
      { label: 'Pantorrilla (cm)', field: 'pantorrilla', unit: ' cm', decreaseIsGood: false },
      { label: '% Grasa Corporal', field: 'grasaPct', unit: '%', decreaseIsGood: true }
    ];

    const isBulking = u.objetivo === 'Ganar músculo';
    if (isBulking) {
      matrixRows.forEach(row => {
        if (['peso', 'pecho', 'brazoIzq', 'brazoDer', 'musloIzq', 'musloDer', 'pantorrilla'].includes(row.field)) {
          row.decreaseIsGood = false;
        }
      });
    }

    // Print Header
    let printHeaderHtml = `
      <div class="print-only-header">
        <div class="print-header-grid">
          <div>
            <div class="print-title">ROMEO PERSONAL TRAINER</div>
            <div style="font-size:12px;color:#999">High Performance Fitness · Ficha de Evolución</div>
          </div>
          <div style="text-align:right">
            <div style="font-weight:700">Ficha Mensual</div>
            <div style="font-size:11px;color:#999">Fecha Impresión: ${new Date().toLocaleDateString('es-ES')}</div>
          </div>
        </div>
        <div class="print-client-info">
          <div><strong>Cliente:</strong> ${u.nombre}</div>
          <div><strong>Objetivo:</strong> ${u.objetivo}</div>
          <div><strong>Nivel:</strong> ${u.nivel}</div>
          <div><strong>Edad:</strong> ${u.edad} años</div>
          <div><strong>Estatura:</strong> ${u.estatura} cm</div>
          <div><strong>Entrenador:</strong> Romeo PT</div>
        </div>
      </div>
    `;

    // KPI Metrics row
    let html = printHeaderHtml + `<div class="progreso-header-info">
      <div class="pi-item"><div class="pi-val" style="background:var(--grad-main);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${u?.nombre?.split(' ').slice(0,2).join(' ')||'—'}</div><div class="pi-lbl">Cliente</div></div>
      <div class="pi-item"><div class="pi-val" style="color:var(--blue)">${u?.peso||'—'} kg</div><div class="pi-lbl">Peso Inicial</div></div>
      <div class="pi-item"><div class="pi-val" style="color:var(--pink)">${pesoActual} kg</div><div class="pi-lbl">Peso Actual</div></div>
      <div class="pi-item"><div class="pi-val" style="color:${parseFloat(diff)<=0?'var(--green)':'var(--orange)'}">${parseFloat(diff)>0?'+':''}${diff} kg</div><div class="pi-lbl">Variación</div></div>
      <div class="pi-item"><div class="pi-val">${b}</div><div class="pi-lbl">IMC Actual</div></div>
    </div>`;

    // 12-Month Table
    let tableHeaders = `<tr><th class="col-medida">Medida</th><th>Inicial</th>`;
    for (let m = 1; m <= 12; m++) {
      tableHeaders += `<th>Mes ${m}</th>`;
    }
    tableHeaders += `<th style="text-align:right; border-left: 2px solid var(--border)">Avance</th></tr>`;

    let tableRows = '';
    matrixRows.forEach(row => {
      const initVal = u[row.field] !== undefined ? u[row.field] : null;
      let rowHtml = `<tr><td class="col-medida"><strong>${row.label}</strong></td><td class="col-mes">${initVal !== null ? initVal : '—'}</td>`;
      
      let lastVal = initVal;
      for (let m = 1; m <= 12; m++) {
        const val = mesMap[m] ? mesMap[m][row.field] : null;
        rowHtml += `<td class="col-mes">${val !== null ? val : '—'}</td>`;
        if (val !== null) lastVal = val;
      }

      // Calculate Avance
      let avanceStr = '—';
      let avanceStyle = 'color: var(--text-secondary);';
      if (initVal !== null && lastVal !== null && initVal > 0) {
        const d = lastVal - initVal;
        const pct = (d / initVal) * 100;
        
        let good = row.decreaseIsGood ? d < 0 : d > 0;
        let c = 'var(--text-secondary)';
        if (d !== 0) {
          c = good ? 'var(--green)' : 'var(--orange)';
        }
        
        avanceStr = `${d > 0 ? '+' : ''}${d.toFixed(1)}${row.unit} (${pct > 0 ? '+' : ''}${pct.toFixed(1)}%)`;
        avanceStyle = `color:${c}; font-weight:800;`;
      }

      rowHtml += `<td class="col-avance" style="${avanceStyle}; border-left: 2px solid var(--border)">${avanceStr}</td></tr>`;
      tableRows += rowHtml;
    });

    // Add Observaciones row
    let obsRow = `<tr class="row-obs"><td class="col-medida"><strong>Observaciones</strong></td><td style="font-size:10px; max-width:120px; word-wrap:break-word;">${u.obs || '—'}</td>`;
    for (let m = 1; m <= 12; m++) {
      const note = mesMap[m] ? (mesMap[m].notes || mesMap[m].notas) : null;
      obsRow += `<td style="font-size:10px; text-align:center; max-width:80px; word-wrap:break-word;">${note || '—'}</td>`;
    }
    obsRow += `<td style="border-left: 2px solid var(--border)"></td></tr>`;
    tableRows += obsRow;

    html += `
      <div class="matrix-section-title">📊 Balance de Marcos y Avance por Mes</div>
      <div class="matrix-table-container">
        <table class="matrix-table">
          <thead>${tableHeaders}</thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    `;

    // Weight evolution points
    let weightPoints = [];
    if (u.peso) weightPoints.push({ x: 0, y: u.peso, label: 'Ini' });
    for (let m = 1; m <= 12; m++) {
      if (mesMap[m] && mesMap[m].peso) {
        weightPoints.push({ x: m, y: mesMap[m].peso, label: `M${m}` });
      }
    }

    let weightSvgHtml = 'No hay suficientes datos de peso para graficar.';
    if (weightPoints.length >= 1) {
      const W = 600, H = 220, pad = { t: 30, r: 25, b: 40, l: 50 };
      const yValues = weightPoints.map(p => p.y);
      const minW = Math.min(...yValues) - 2;
      const maxW = Math.max(...yValues) + 2;
      const range = maxW - minW || 1;

      const sx = idx => pad.l + (weightPoints[idx].x / 12) * (W - pad.l - pad.r);
      const sy = val => H - pad.b - ((val - minW) / range) * (H - pad.t - pad.b);

      const pts = weightPoints.map((p, i) => `${sx(i)},${sy(p.y)}`).join(' ');
      const areaPoints = `${sx(0)},${H-pad.b} ${pts} ${sx(weightPoints.length-1)},${H-pad.b}`;

      const gridLines = [0, 0.25, 0.5, 0.75, 1].map(f => {
        const y = pad.t + f * (H - pad.t - pad.b);
        const val = (maxW - f * range).toFixed(1);
        return `<line x1="${pad.l}" y1="${y}" x2="${W - pad.r}" y2="${y}" stroke="rgba(255,255,255,0.05)" stroke-dasharray="3,3"/><text x="${pad.l - 8}" y="${y + 4}" text-anchor="end" fill="#777" font-size="9" font-family="Sora">${val} kg</text>`;
      }).join('');

      const monthGridLines = Array.from({length: 13}, (_, i) => {
        const x = pad.l + (i / 12) * (W - pad.l - pad.r);
        const label = i === 0 ? 'Ini' : `M${i}`;
        return `<line x1="${x}" y1="${pad.t}" x2="${x}" y2="${H - pad.b}" stroke="rgba(255,255,255,0.02)"/><text x="${x}" y="${H - 10}" text-anchor="middle" fill="#777" font-size="9" font-family="Sora">${label}</text>`;
      }).join('');

      const dotElements = weightPoints.map((p, i) => `<circle cx="${sx(i)}" cy="${sy(p.y)}" r="4.5" fill="url(#pcg)" stroke="#1c1c1c" stroke-width="2"/><text x="${sx(i)}" y="${sy(p.y) - 8}" text-anchor="middle" fill="#fff" font-size="9" font-family="Sora" font-weight="700">${p.y}</text>`).join('');

      weightSvgHtml = `
        <div class="card">
          <div class="card-header"><h2>📈 Cambio de Peso (kg)</h2></div>
          <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;background:var(--bg-card);padding:10px 0;">
            <defs>
              <linearGradient id="pcg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF3CAC"/><stop offset="100%" stop-color="#2B86C5"/></linearGradient>
              <linearGradient id="pag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF3CAC" stop-opacity=".15"/><stop offset="100%" stop-color="#FF3CAC" stop-opacity="0"/></linearGradient>
            </defs>
            ${gridLines}
            ${monthGridLines}
            <polygon points="${areaPoints}" fill="url(#pag)"/>
            <polyline points="${pts}" fill="none" stroke="url(#pcg)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
            ${dotElements}${u.pesoObjetivo ? `<line x1="${pad.l}" y1="${sy(u.pesoObjetivo)}" x2="${W - pad.r}" y2="${sy(u.pesoObjetivo)}" stroke="var(--accent)" stroke-dasharray="4,4" stroke-width="1"/>` : ''}
          </svg>
        </div>
      `;
    }

    // Comparison measures chart
    const measurements = [
      { label: 'Cintura', field: 'cintura', color: '#FF3CAC' },
      { label: 'Pecho', field: 'pecho', color: '#2B86C5' },
      { label: 'Cadera', field: 'cadera', color: '#00E5A0' },
      { label: 'Muslo', field: 'musloDer', color: '#FF7043' }
    ];

    let measuresPoints = { cintura: [], pecho: [], cadera: [], musloDer: [] };
    measurements.forEach(m => {
      if (u[m.field]) {
        measuresPoints[m.field].push({ x: 0, y: u[m.field] });
      }
    });

    for (let month = 1; month <= 12; month++) {
      if (mesMap[month]) {
        measurements.forEach(m => {
          if (mesMap[month][m.field]) {
            measuresPoints[m.field].push({ x: month, y: mesMap[month][m.field] });
          }
        });
      }
    }

    let measuresSvgHtml = 'No hay suficientes medidas para graficar la evolución.';
    if (measurements.some(m => measuresPoints[m.field].length >= 1)) {
      const W = 600, H = 220, pad = { t: 30, r: 25, b: 40, l: 50 };
      
      let allY = [];
      measurements.forEach(m => {
        measuresPoints[m.field].forEach(p => allY.push(p.y));
      });
      const minVal = Math.max(0, Math.min(...allY) - 5);
      const maxVal = Math.max(...allY) + 5;
      const rangeVal = maxVal - minVal || 1;

      const sx = monthVal => pad.l + (monthVal / 12) * (W - pad.l - pad.r);
      const sy = val => H - pad.b - ((val - minVal) / rangeVal) * (H - pad.t - pad.b);

      const gridLines = [0, 0.25, 0.5, 0.75, 1].map(f => {
        const y = pad.t + f * (H - pad.t - pad.b);
        const val = (maxVal - f * rangeVal).toFixed(0);
        return `<line x1="${pad.l}" y1="${y}" x2="${W - pad.r}" y2="${y}" stroke="rgba(255,255,255,0.05)" stroke-dasharray="3,3"/><text x="${pad.l - 8}" y="${y + 4}" text-anchor="end" fill="#777" font-size="9" font-family="Sora">${val} cm</text>`;
      }).join('');

      const monthGridLines = Array.from({length: 13}, (_, i) => {
        const x = pad.l + (i / 12) * (W - pad.l - pad.r);
        const label = i === 0 ? 'Ini' : `M${i}`;
        return `<line x1="${x}" y1="${pad.t}" x2="${x}" y2="${H - pad.b}" stroke="rgba(255,255,255,0.02)"/><text x="${x}" y="${H - 10}" text-anchor="middle" fill="#777" font-size="9" font-family="Sora">${label}</text>`;
      }).join('');

      let pathsHtml = '';
      let dotsHtml = '';
      measurements.forEach(m => {
        const ptsList = measuresPoints[m.field];
        if (ptsList.length >= 1) {
          const pts = ptsList.map(p => `${sx(p.x)},${sy(p.y)}`).join(' ');
          pathsHtml += `<polyline points="${pts}" fill="none" stroke="${m.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
          dotsHtml += ptsList.map(p => `<circle cx="${sx(p.x)}" cy="${sy(p.y)}" r="3" fill="${m.color}" stroke="#1c1c1c" stroke-width="1"/><text x="${sx(p.x)}" y="${sy(p.y) - 6}" text-anchor="middle" fill="${m.color}" font-size="7.5" font-weight="700" font-family="Sora">${p.y}</text>`).join('');
        }
      });

      measuresSvgHtml = `
        <div class="card">
          <div class="card-header" style="display:flex; justify-content:space-between; align-items:center;">
            <h2>📐 Comparativo de Medidas (cm)</h2>
            <div style="display:flex; gap:10px; font-size:10px;">
              ${measurements.map(m => `<span style="color:${m.color}">● ${m.label}</span>`).join('')}
            </div>
          </div>
          <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;background:var(--bg-card);padding:10px 0;">
            ${gridLines}
            ${monthGridLines}
            ${pathsHtml}
            ${dotsHtml}
          </svg>
        </div>
      `;
    }

    // Muscular % evolution chart
    let muscularPoints = [];
    if (u.muscularPct != null && u.muscularPct !== undefined) muscularPoints.push({ x: 0, y: parseFloat(u.muscularPct) });
    for (let mm = 1; mm <= 12; mm++) {
      if (mesMap[mm] && mesMap[mm].muscularPct != null) muscularPoints.push({ x: mm, y: parseFloat(mesMap[mm].muscularPct) });
    }
    let muscularSvgHtml = '';
    if (muscularPoints.length >= 1) {
      const MW = 600, MH = 200, Mpad = { t: 28, r: 22, b: 38, l: 50 };
      const myVals = muscularPoints.map(p => p.y);
      const mMinY = Math.min(...myVals) - 3;
      const mMaxY = Math.max(...myVals) + 3;
      const mRange = mMaxY - mMinY || 1;
      const msx = idx => Mpad.l + (muscularPoints[idx].x / 12) * (MW - Mpad.l - Mpad.r);
      const msy = val => MH - Mpad.b - ((val - mMinY) / mRange) * (MH - Mpad.t - Mpad.b);
      const mPts = muscularPoints.map((p, i) => `${msx(i)},${msy(p.y)}`).join(' ');
      const mArea = `${msx(0)},${MH - Mpad.b} ${mPts} ${msx(muscularPoints.length - 1)},${MH - Mpad.b}`;
      const mGrid = [0,0.25,0.5,0.75,1].map(f => {
        const y = Mpad.t + f*(MH-Mpad.t-Mpad.b); const v = (mMaxY - f*mRange).toFixed(1);
        return `<line x1="${Mpad.l}" y1="${y}" x2="${MW-Mpad.r}" y2="${y}" stroke="rgba(255,255,255,0.05)" stroke-dasharray="3,3"/><text x="${Mpad.l-5}" y="${y+4}" text-anchor="end" fill="#777" font-size="9" font-family="Sora">${v}%</text>`;
      }).join('');
      const mMGrid = Array.from({length:13},(_,i)=>{const x=Mpad.l+(i/12)*(MW-Mpad.l-Mpad.r);const lbl=i===0?'Ini':`M${i}`;return `<line x1="${x}" y1="${Mpad.t}" x2="${x}" y2="${MH-Mpad.b}" stroke="rgba(255,255,255,0.02)"/><text x="${x}" y="${MH-9}" text-anchor="middle" fill="#777" font-size="9" font-family="Sora">${lbl}</text>`;}).join('');
      const mDots = muscularPoints.map((p,i)=>`<circle cx="${msx(i)}" cy="${msy(p.y)}" r="4.5" fill="url(#mu_g)" stroke="#1c1c1c" stroke-width="2"/><text x="${msx(i)}" y="${msy(p.y)-8}" text-anchor="middle" fill="#fff" font-size="9" font-family="Sora" font-weight="700">${p.y}</text>`).join('');
      muscularSvgHtml = `<div class="card">
        <div class="card-header"><h2>\u{1F4AA} % Masa Muscular</h2></div>
        <svg viewBox="0 0 ${MW} ${MH}" style="width:100%;height:auto;padding:8px 0;">
          <defs>
            <linearGradient id="mu_g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF7043"/><stop offset="100%" stop-color="#FF3CAC"/></linearGradient>
            <linearGradient id="mu_a" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF7043" stop-opacity=".15"/><stop offset="100%" stop-color="#FF7043" stop-opacity="0"/></linearGradient>
          </defs>
          ${mGrid}${mMGrid}<polygon points="${mArea}" fill="url(#mu_a)"/>
          <polyline points="${mPts}" fill="none" stroke="url(#mu_g)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
          ${mDots}
        </svg>
      </div>`;
    }

    html += `
      <div class="evolution-charts-grid">
        ${weightSvgHtml}
        ${measuresSvgHtml}
      </div>
      ${muscularSvgHtml}
    `;

    // Silhouettes
    let latestMeasures = {
      pecho: u.pecho,
      cintura: u.cintura,
      cadera: u.cadera,
      brazoIzq: u.brazoIzq,
      brazoDer: u.brazoDer,
      musloIzq: u.musloIzq,
      musloDer: u.musloDer,
      pantorrilla: u.pantorrilla
    };
    
    for (let month = 12; month >= 1; month--) {
      if (mesMap[month]) {
        Object.keys(latestMeasures).forEach(k => {
          if (mesMap[month][k] !== null && mesMap[month][k] !== undefined) {
            latestMeasures[k] = mesMap[month][k];
          }
        });
      }
    }

    function getSilhouetteBadge(label, val) {
      return `<div class="sil-indicator-badge"><span>${label}</span>${val ? val + ' cm' : '—'}</div>`;
    }

    let initialSilhouetteHtml = `
      <div class="silhouette-box">
        <div class="silhouette-title-label inicial">Inicial (Antes)</div>
        <div class="silhouette-wrapper">
          <img src="img/figuras.png" class="silhouette-img" alt="Silueta Física" />
          <div class="sil-indicator sil-pecho right-align">${getSilhouetteBadge('Pecho', u.pecho)}</div>
          <div class="sil-indicator sil-cintura right-align">${getSilhouetteBadge('Cintura', u.cintura)}</div>
          <div class="sil-indicator sil-cadera left-align">${getSilhouetteBadge('Cadera', u.cadera)}</div>
          <div class="sil-indicator sil-brazo-der right-align">${getSilhouetteBadge('B. Der', u.brazoDer)}</div>
          <div class="sil-indicator sil-brazo-izq left-align">${getSilhouetteBadge('B. Izq', u.brazoIzq)}</div>
          <div class="sil-indicator sil-muslo-der right-align">${getSilhouetteBadge('M. Der', u.musloDer)}</div>
          <div class="sil-indicator sil-muslo-izq left-align">${getSilhouetteBadge('M. Izq', u.musloIzq)}</div>
          <div class="sil-indicator sil-pantorrilla left-align">${getSilhouetteBadge('Pant.', u.pantorrilla)}</div>
        </div>
      </div>
    `;

    let actualSilhouetteHtml = `
      <div class="silhouette-box">
        <div class="silhouette-title-label actual">Actual (Evolución)</div>
        <div class="silhouette-wrapper">
          <img src="img/figuras.png" class="silhouette-img" alt="Silueta Física" />
          <div class="sil-indicator sil-pecho right-align">${getSilhouetteBadge('Pecho', latestMeasures.pecho)}</div>
          <div class="sil-indicator sil-cintura right-align">${getSilhouetteBadge('Cintura', latestMeasures.cintura)}</div>
          <div class="sil-indicator sil-cadera left-align">${getSilhouetteBadge('Cadera', latestMeasures.cadera)}</div>
          <div class="sil-indicator sil-brazo-der right-align">${getSilhouetteBadge('B. Der', latestMeasures.brazoDer)}</div>
          <div class="sil-indicator sil-brazo-izq left-align">${getSilhouetteBadge('B. Izq', latestMeasures.brazoIzq)}</div>
          <div class="sil-indicator sil-muslo-der right-align">${getSilhouetteBadge('M. Der', latestMeasures.musloDer)}</div>
          <div class="sil-indicator sil-muslo-izq left-align">${getSilhouetteBadge('M. Izq', latestMeasures.musloIzq)}</div>
          <div class="sil-indicator sil-pantorrilla left-align">${getSilhouetteBadge('Pant.', latestMeasures.pantorrilla)}</div>
        </div>
      </div>
    `;

    html += `
      <div class="matrix-section-title">👤 Evolución Física y Puntos de Medida</div>
      <div class="silhouettes-section">
        ${initialSilhouetteHtml}
        ${actualSilhouetteHtml}
      </div>
    `;

    // Photos Evolution
    let photosHtml = `<div class="card" style="margin-bottom:16px">
      <div class="card-header" style="display:flex; justify-content:space-between; align-items:center;">
        <h2>📷 Evolución Visual (Antes y Después)</h2>
        <button class="btn-primary" onclick="window.print()" style="padding:6px 12px; font-size:11px;">🖨️ Imprimir Ficha</button>
      </div>
      <div class="before-after-grid" style="margin-top: 0; padding: 0 14px 14px;">
        <!-- Frente -->
        <div class="before-after-card">
          <h3>Frente</h3>
          <div class="ba-photos-container">
            <div class="ba-photo-box">
              <div class="ba-photo-frame" id="prog-iniFrente">
                ${u.fotoIniFrente ? `<img src="${u.fotoIniFrente}" />` : `<span class="ba-empty-photo">👤</span>`}
              </div>
              <span class="ba-label antes">Antes</span>
            </div>
            <div class="ba-photo-box">
              <div class="ba-photo-frame" id="prog-finFrente">
                ${u.fotoFinFrente ? `<img src="${u.fotoFinFrente}" />` : `<span class="ba-empty-photo">👤</span>`}
              </div>
              <span class="ba-label despues">Después</span>
            </div>
          </div>
        </div>

        <!-- Perfil -->
        <div class="before-after-card">
          <h3>Perfil</h3>
          <div class="ba-photos-container">
            <div class="ba-photo-box">
              <div class="ba-photo-frame" id="prog-iniPerfil">
                ${u.fotoIniPerfil ? `<img src="${u.fotoIniPerfil}" />` : `<span class="ba-empty-photo">👤</span>`}
              </div>
              <span class="ba-label antes">Antes</span>
            </div>
            <div class="ba-photo-box">
              <div class="ba-photo-frame" id="prog-finPerfil">
                ${u.fotoFinPerfil ? `<img src="${u.fotoFinPerfil}" />` : `<span class="ba-empty-photo">👤</span>`}
              </div>
              <span class="ba-label despues">Después</span>
            </div>
          </div>
        </div>

        <!-- Espalda -->
        <div class="before-after-card">
          <h3>Espalda</h3>
          <div class="ba-photos-container">
            <div class="ba-photo-box">
              <div class="ba-photo-frame" id="prog-iniEspalda">
                ${u.fotoIniEspalda ? `<img src="${u.fotoIniEspalda}" />` : `<span class="ba-empty-photo">👤</span>`}
              </div>
              <span class="ba-label antes">Antes</span>
            </div>
            <div class="ba-photo-box">
              <div class="ba-photo-frame" id="prog-finEspalda">
                ${u.fotoFinEspalda ? `<img src="${u.fotoFinEspalda}" />` : `<span class="ba-empty-photo">👤</span>`}
              </div>
              <span class="ba-label despues">Después</span>
            </div>
          </div>
        </div>
      </div>
    </div>`;

    // History and final structure
    const histHtml = progresos.map((p,i)=>{
      const prev = progresos[i+1];
      const pd = prev ? (p.peso-prev.peso).toFixed(1) : null;
      const medidas = [['Pecho',p.pecho],['Cintura',p.cintura],['Cadera',p.cadera],['B.Izq',p.brazoIzq],['B.Der',p.brazoDer],['M.Izq',p.musloIzq],['M.Der',p.musloDer],['Pant.',p.pantorrilla],['% Grasa',p.grasaPct]].filter(([,v])=>v);
      const mesLabel = p.mes ? `Mes ${p.mes}` : 'Registro único';
      return `<div class="progreso-item">
        <div class="progreso-item-header">
          <div>
            <div class="progreso-fecha">📅 ${formatDate(p.fecha)} · <span class="badge badge-purple">${mesLabel}</span></div>
            ${p.notes || p.notas ? `<div style="font-size:11px;color:var(--text-muted);margin-top:2px">	ext${p.notes || p.notas}</div>`:''}
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            ${pd!==null?`<span class="peso-diff ${parseFloat(pd)<=0?'pos':'neg'}">${parseFloat(pd)>0?'+':''}${pd}kg</span>`:''}
            <div class="progreso-peso">${p.peso} kg</div>
            <button class="btn-ghost btn-danger" onclick="eliminarMedicion('${p.id}')" style="padding:5px 8px">✕</button>
          </div>
        </div>
        ${medidas.length?`<div class="medidas-mini">${medidas.map(([l,v])=>`<div class="medida-chip"><div class="val">${v}${l==='% Grasa'?'%':' cm'}</div><div class="lbl">${l}</div></div>`).join('')}</div>`:''}
      </div>`;
    }).join('');

    html += photosHtml + `<h3 style="font-size:13px;font-weight:700;color:var(--text-secondary);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.8px">📋 Historial de Registros</h3><div class="progreso-registros">${histHtml}</div>`;
    container.innerHTML = html;

    // Check if printing query is present
    const isPrint = new URLSearchParams(window.location.search).get('print');
    if (isPrint) {
      setTimeout(() => {
        window.print();
      }, 1200);
    }
  }

  function abrirModalMedicion() {
    const uid = sel.value; if (!uid) { showToast('Selecciona un cliente primero', 'error'); return; }
    document.getElementById('form-medicion').reset();
    document.getElementById('p-fecha').value = new Date().toISOString().split('T')[0];
    const u = DB.usuarios.find(x=>x.id===uid);
    const last = DB.progresos.filter(p=>p.usuarioId===uid).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha))[0];
    document.getElementById('p-peso').value = last?.peso || u?.peso || '';
    document.getElementById('p-grasa-pct').value = last?.grasaPct || u?.grasaPct || '';
    document.getElementById('p-mes').value = '';
    ['pecho','cintura','cadera'].forEach(m => { document.getElementById(`p-${m}`).value = last?.[m] || u?.[m] || ''; });
    document.getElementById('p-brazo-izq').value = last?.brazoIzq || u?.brazoIzq || '';
    document.getElementById('p-brazo-der').value = last?.brazoDer || u?.brazoDer || '';
    document.getElementById('p-muslo-izq').value = last?.musloIzq || u?.musloIzq || '';
    document.getElementById('p-muslo-der').value = last?.musloDer || u?.musloDer || '';
    document.getElementById('p-pantorrilla').value = last?.pantorrilla || u?.pantorrilla || '';
    openModal('modal-medicion');
  }

  function guardarMedicion(e) {
    e.preventDefault();
    const uid = sel.value;
    const m = {
      id: genId(),
      usuarioId: uid,
      fecha: document.getElementById('p-fecha').value,
      mes: parseInt(document.getElementById('p-mes').value) || null,
      peso: parseFloat(document.getElementById('p-peso').value),
      pecho: parseFloat(document.getElementById('p-pecho').value) || null,
      cintura: parseFloat(document.getElementById('p-cintura').value) || null,
      cadera: parseFloat(document.getElementById('p-cadera').value) || null,
      brazoIzq: parseFloat(document.getElementById('p-brazo-izq').value) || null,
      brazoDer: parseFloat(document.getElementById('p-brazo-der').value) || null,
      musloIzq: parseFloat(document.getElementById('p-muslo-izq').value) || null,
      musloDer: parseFloat(document.getElementById('p-muslo-der').value) || null,
      pantorrilla: parseFloat(document.getElementById('p-pantorrilla').value) || null,
      grasaPct: parseFloat(document.getElementById('p-grasa-pct').value) || null,
      muscularPct: parseFloat(document.getElementById('p-muscular-pct').value) || null,
      notas: document.getElementById('p-notas').value.trim()
    };
    DB.progresos.push(m);
    saveDB(); closeModal('modal-medicion'); renderProgreso(uid);
    showToast('✅ Medición guardada correctamente');
  }
  
  function compartirProgresoWhatsapp() {
    const uid = document.getElementById('sel-usuario').value;
    if (!uid) { showToast('Selecciona un cliente para compartir', 'error'); return; }
    const u = DB.usuarios.find(x => x.id === uid);
    const progresos = DB.progresos.filter(p => p.usuarioId === uid).sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
    const latest = progresos[0] || {};
    const pesoActual = latest.peso || u.peso || '';
    const diff = u.peso ? (pesoActual - u.peso).toFixed(1) : '';
    const grasa = latest.grasaPct !== undefined ? `${latest.grasaPct}%` : '—';
    const mensaje = `*Progreso de ${u.nombre}*\nObjetivo: ${u.objetivo}\nPeso inicial: ${u.peso} kg\nPeso actual: ${pesoActual} kg (${diff > 0 ? '+'+diff : diff} kg)\n% Grasa corporal: ${grasa}\n`; 
    const url = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;
    window.open(url, '_blank');
  }

  function eliminarMedicion(id) {
    if (!confirm('¿Eliminar esta medición?')) return;
    DB.progresos = DB.progresos.filter(p=>p.id!==id);
    saveDB(); renderProgreso(sel.value); showToast('🗑️ Medición eliminada', 'error');
  }

  // Métodos de ayuda para fotos
  function subirFotoFinal(uid, angle) {
    const u = DB.usuarios.find(x => x.id === uid);
    if (!u) return;

    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';

    const choice = confirm("¿Quieres usar la cámara web de este computador?\n(Aceptar = Usar cámara web, Cancelar = Buscar archivo de imagen)");
    if (choice) {
      openWebcamModal(function(dataUrl) {
        saveFinalPhoto(uid, angle, dataUrl);
      });
    } else {
      input.onchange = function(e) {
        if (e.target.files && e.target.files[0]) {
          compressImage(e.target.files[0], 400, 533, 0.6, function(dataUrl) {
            saveFinalPhoto(uid, angle, dataUrl);
          });
        }
      };
      input.click();
    }
  }

  function saveFinalPhoto(uid, angle, dataUrl) {
    const idx = DB.usuarios.findIndex(x => x.id === uid);
    if (idx < 0) return;
    const field = `fotoFin${angle}`;
    DB.usuarios[idx][field] = dataUrl;
    saveDB();
    showToast(`✅ Foto de ${angle} ("Después") guardada`);
    renderProgreso(uid);
  }

  function eliminarFotoFinal(uid, angle, event) {
    if (event) event.stopPropagation();
    if (!confirm(`¿Eliminar la foto "Después" de ${angle}?`)) return;
    const idx = DB.usuarios.findIndex(x => x.id === uid);
    if (idx < 0) return;
    const field = `fotoFin${angle}`;
    DB.usuarios[idx][field] = null;
    saveDB();
    showToast(`🗑️ Foto "Después" de ${angle} eliminada`, 'error');
    renderProgreso(uid);
  }

  function subirFotoInicial(uid, angle) {
    const u = DB.usuarios.find(x => x.id === uid);
    if (!u) return;

    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';

    const choice = confirm("¿Quieres usar la cámara web de este computador?\n(Aceptar = Usar cámara web, Cancelar = Buscar archivo de imagen)");
    if (choice) {
      openWebcamModal(function(dataUrl) {
        saveInitialPhoto(uid, angle, dataUrl);
      });
    } else {
      input.onchange = function(e) {
        if (e.target.files && e.target.files[0]) {
          compressImage(e.target.files[0], 400, 533, 0.6, function(dataUrl) {
            saveInitialPhoto(uid, angle, dataUrl);
          });
        }
      };
      input.click();
    }
  }

  function saveInitialPhoto(uid, angle, dataUrl) {
    const idx = DB.usuarios.findIndex(x => x.id === uid);
    if (idx < 0) return;
    const field = `fotoIni${angle}`;
    DB.usuarios[idx][field] = dataUrl;
    saveDB();
    showToast(`✅ Foto de ${angle} ("Antes") guardada`);
    renderProgreso(uid);
  }

  function eliminarFotoInicial(uid, angle, event) {
    if (event) event.stopPropagation();
    if (!confirm(`¿Eliminar la foto "Antes" de ${angle}?`)) return;
    const idx = DB.usuarios.findIndex(x => x.id === uid);
    if (idx < 0) return;
    const field = `fotoIni${angle}`;
    DB.usuarios[idx][field] = null;
    saveDB();
    showToast(`🗑️ Foto "Antes" de ${angle} eliminada`, 'error');
    renderProgreso(uid);
  }
</script>
</body>
</html>
